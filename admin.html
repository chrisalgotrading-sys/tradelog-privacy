<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradeLog Admin — Grant Access</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'SF Mono', monospace; background: #0d0f14; color: #e8eaf0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #141720; border: 1px solid #2a2f45; border-radius: 12px; padding: 32px; width: 100%; max-width: 480px; }
    .logo { font-size: 13px; color: #00d4aa; font-weight: 700; margin-bottom: 24px; letter-spacing: 0.08em; text-transform: uppercase; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .sub { font-size: 13px; color: #6b7a99; margin-bottom: 28px; }
    label { font-size: 11px; color: #a0aec8; text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 6px; }
    input, select { width: 100%; background: #1c2030; border: 1px solid #2a2f45; border-radius: 6px; padding: 10px 12px; color: #e8eaf0; font-family: monospace; font-size: 13px; margin-bottom: 16px; outline: none; }
    input:focus, select:focus { border-color: #00d4aa; }
    input[type=password] { letter-spacing: 0.1em; }
    button { width: 100%; background: #00d4aa; color: #0d0f14; border: none; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #00bfa0; }
    button:disabled { background: #2a2f45; color: #6b7a99; cursor: not-allowed; }
    .result { margin-top: 16px; padding: 14px; border-radius: 8px; font-size: 13px; line-height: 1.6; display: none; }
    .result.success { background: rgba(0,212,170,0.08); border: 1px solid rgba(0,212,170,0.25); color: #00d4aa; }
    .result.error   { background: rgba(255,83,112,0.08); border: 1px solid rgba(255,83,112,0.25); color: #ff5370; }
    .history { margin-top: 28px; border-top: 1px solid #2a2f45; padding-top: 20px; }
    .history h2 { font-size: 12px; color: #6b7a99; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
    .history-item { background: #1c2030; border-radius: 6px; padding: 10px 12px; margin-bottom: 8px; font-size: 12px; display: flex; justify-content: space-between; align-items: center; }
    .history-item .email { color: #e8eaf0; }
    .history-item .plan { color: #00d4aa; font-size: 10px; background: rgba(0,212,170,0.1); padding: 2px 8px; border-radius: 10px; }
    .history-item .date { color: #6b7a99; font-size: 10px; }
    .empty-history { font-size: 12px; color: #4a5568; text-align: center; padding: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">★ TradeLog Admin</div>
    <h1>Grant Pro Access</h1>
    <p class="sub">Give free Pro access to a specific email address.</p>

    <label>Admin Secret</label>
    <input type="password" id="secret" placeholder="Your GRANT_SECRET">

    <label>Email Address</label>
    <input type="email" id="email" placeholder="youtuber@gmail.com">

    <label>Plan</label>
    <select id="plan">
      <option value="complimentary">Complimentary (lifetime)</option>
      <option value="press">Press / Media</option>
      <option value="partner">Partner</option>
      <option value="annual">Annual (1 year)</option>
    </select>

    <button id="grant-btn">Grant Pro Access →</button>
    <div class="result" id="result"></div>

    <div class="history">
      <h2>Recently Granted</h2>
      <div id="history-list"></div>
    </div>
  </div>

  <script>
    const BACKEND = 'https://tradelog-backend.netlify.app'
    const HISTORY_KEY = 'tradelog_grant_history'

    // Load history from localStorage
    function loadHistory() {
      const list = document.getElementById('history-list')
      const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]')
      if (!history.length) {
        list.innerHTML = '<div class="empty-history">No grants yet</div>'
        return
      }
      list.innerHTML = history.slice().reverse().slice(0, 10).map(h =>
        `<div class="history-item">
          <div>
            <div class="email">${h.email}</div>
            <div class="date">${new Date(h.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</div>
          </div>
          <span class="plan">${h.plan}</span>
        </div>`
      ).join('')
    }

    function saveHistory(email, plan) {
      const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]')
      history.push({ email, plan, date: Date.now() })
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history))
      loadHistory()
    }

    document.getElementById('grant-btn').addEventListener('click', async () => {
      const secret = document.getElementById('secret').value.trim()
      const email  = document.getElementById('email').value.trim().toLowerCase()
      const plan   = document.getElementById('plan').value
      const btn    = document.getElementById('grant-btn')
      const result = document.getElementById('result')

      if (!secret) { showResult('error', 'Enter your admin secret.'); return }
      if (!email || !email.includes('@')) { showResult('error', 'Enter a valid email address.'); return }

      btn.disabled    = true
      btn.textContent = 'Granting access...'
      result.style.display = 'none'

      try {
        const res  = await fetch(`${BACKEND}/.netlify/functions/grant-access`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ secret, email, plan })
        })
        const data = await res.json()

        if (!res.ok) {
          showResult('error', '✗ ' + (data.error || 'Error'))
        } else {
          showResult('success',
            `✓ Pro access granted to ${email}\n\n` +
            `Tell them to:\n` +
            `1. Install TradeLog from the Chrome Web Store\n` +
            `2. Click ★ Pro → "Already a subscriber? Restore access"\n` +
            `3. Enter: ${email}`
          )
          saveHistory(email, plan)
          document.getElementById('email').value = ''
        }
      } catch (err) {
        showResult('error', '✗ Network error. Check your connection.')
      }

      btn.disabled    = false
      btn.textContent = 'Grant Pro Access →'
    })

    function showResult(type, msg) {
      const el = document.getElementById('result')
      el.className   = 'result ' + type
      el.style.display = 'block'
      el.style.whiteSpace = 'pre-line'
      el.textContent = msg
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('grant-btn').click()
    })

    loadHistory()
  </script>
</body>
</html>
